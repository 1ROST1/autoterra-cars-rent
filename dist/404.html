<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>404 | AutoTerra</title>
    <style>
      body {
        margin: 0;
        font-family: Outfit, sans-serif;
        background: linear-gradient(135deg, #f8fafc, #dbeafe);
        color: #0f172a;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        max-width: 640px;
        width: 100%;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 24px;
        padding: 40px 32px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 5vw, 3rem);
      }

      p {
        margin: 0 0 24px;
        line-height: 1.6;
        color: #475569;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 18px;
        border-radius: 999px;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }

      a.secondary {
        background: #fff;
        color: #0f172a;
        border: 1px solid rgba(148, 163, 184, 0.5);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>404</h1>
        <p>The page you requested could not be found. Choose a language homepage below.</p>
        <nav>
          <a href="/ru">Russkii</a>
          <a href="/ro" class="secondary">Romana</a>
          <a href="/en" class="secondary">English</a>
        </nav>
      </section>
    </main>
  </body>
</html>

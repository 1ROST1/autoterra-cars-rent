<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex, nofollow" />
    <meta http-equiv="refresh" content="0; url=/ro/" />
    <link rel="canonical" href="https://autoterra.md/ro/" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var target = "/ro/";
        var destination = target + window.location.search + window.location.hash;
        window.location.replace(destination);
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="/ro/">/ro/</a>.</p>
  </body>
</html>
